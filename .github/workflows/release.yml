name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.25.x"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/bifrost

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test
        run: go test ./...

  client:
    name: Build client (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive: tar.gz
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - goos: windows
            goarch: arm64
            ext: .exe
            archive: zip
          - goos: darwin
            goarch: amd64
            ext: ""
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -buildvcs=false -trimpath -ldflags="-s -w" -o "dist/bifrost-client-${GOOS}-${GOARCH}${{ matrix.ext }}" ./cmd/client

      - name: Package tar.gz
        if: matrix.archive == 'tar.gz'
        run: |
          tar -C dist -czf "dist/bifrost-client-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "bifrost-client-${{ matrix.goos }}-${{ matrix.goarch }}"

      - name: Package zip
        if: matrix.archive == 'zip'
        run: |
          cd dist
          zip "bifrost-client-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "bifrost-client-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: bifrost-client-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/bifrost-client-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive }}
          if-no-files-found: error

  server-image:
    name: Build and publish server image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - client
      - server-image
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download client artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bifrost-client-*
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
